<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Scanner - IITJ</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f6f9; display: flex; flex-direction: column; align-items: center; }
        .header { background-color: #003366; width: 100%; color: white; padding: 15px 0; text-align: center; border-bottom: 4px solid #ffcc00; }
        .header h2 { margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 40px; text-align: center; width: 90%; max-width: 600px; }
        #subjectTitle { color: #003366; margin-bottom: 20px; font-size: 22px; }
        #reader { border: 2px solid #ccc; border-radius: 8px; overflow: hidden; }
        
        
        .result-card { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; text-align: center; }
        .success { background-color: #e8f5e9; color: #2e7d32; border: 2px solid #c8e6c9; }
        .error { background-color: #ffebee; color: #c62828; border: 2px solid #ffcdd2; }
        
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 15px auto; border: 4px solid #003366; background-color: #fff; }
        .student-info { font-size: 22px; font-weight: bold; color: #003366; margin-bottom: 5px; }
        .student-details { font-size: 16px; color: #555; margin-bottom: 5px; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 14px; font-weight: bold; margin-top: 5px; background-color: #003366; color: white; }
        
        .back-btn { margin-top: 20px; background: #666; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; }
        .back-btn:hover { background: #444; }
    </style>
</head>
<body>

    <div class="header">
        <h2>IIT Jodhpur Classroom Attendance</h2>
    </div>

    <div class="container">
        <h1 id="subjectTitle">Class Attendance Scanner</h1>
        <div id="reader"></div>
        
        <div id="result" class="result-card"></div>

        <a href="attendance_selection.html" class="back-btn">Change Subject</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let subject = urlParams.get('subject');
        
        // Clean up the subject name for display
        const displaySubject = subject.replace('_', ' ');
        document.getElementById('subjectTitle').innerText = displaySubject + " Session";

        let isScanning = true;

        function onScanSuccess(decodedText) {
            if (!isScanning) return;
            isScanning = false; 

            fetch('/mark-attendance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ qr_hash: decodedText, subject: subject })
            })
            .then(res => res.json())
            .then(data => {
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                
                // Helper function to generate the ID card HTML
                const generateIdCard = (student) => {
                    const photoSrc = student.photo ? student.photo : 'https://via.placeholder.com/150?text=No+Photo';
                    return `
                        <img src="${photoSrc}" class="profile-pic" alt="Student Photo">
                        <div class="student-info">${student.name}</div>
                        <div class="student-details">Roll No: <strong>${student.roll_number}</strong></div>
                        <div class="status-badge">${student.accountStatus}</div>
                    `;
                };

                if (data.success) {
                    resultDiv.className = 'result-card success';
                    resultDiv.innerHTML = `<h3>✔ ${data.message}</h3>` + generateIdCard(data.student);
                } else {
                    resultDiv.className = 'result-card error';
                    let infoHtml = `<h3>✖ ${data.message}</h3>`;
                    if(data.student) {
                        infoHtml += generateIdCard(data.student);
                    }
                    resultDiv.innerHTML = infoHtml;
                }
                
                // Resume scanning after 3.5 seconds (gives them a little longer to see the photo)
                setTimeout(() => { 
                    isScanning = true; 
                    resultDiv.style.display = 'none'; 
                }, 3500);
            })
            .catch(err => {
                console.error("Server error:", err);
                isScanning = true;
            });
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
